<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Bidang Pembinaan PAUD & Dikmas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding: 0; }
        .page-content { transition: opacity 0.4s ease-in-out; }
        .nav-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 700; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: inline-flex; }
        .loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        
        .avatar-frame { position: relative; width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 3px solid white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); background: #f1f5f9; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        .btn-edit-floating {
            padding: 4px; border-radius: 6px; background: rgba(37, 99, 235, 0.1);
            color: #2563eb; transition: all 0.2s; margin-left: 8px; vertical-align: middle; cursor: pointer;
        }
        .btn-edit-floating:hover { background: #2563eb; color: white; }
        
        @keyframes ai-pulse {
            0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(147, 51, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
        }
        .ai-feature-btn {
            background: linear-gradient(135deg, #9333ea, #2563eb);
            color: white; animation: ai-pulse 2s infinite;
        }

        .profile-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid #2563eb; }
        .profile-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .slide-enter { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900" id="main-body">

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-overlay">
        <div class="flex flex-col items-center gap-4 text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-slate-500 font-medium animate-pulse">Menghubungkan ke Cloud Database...</p>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-2">
                    <div class="flex items-center cursor-pointer" onclick="window.showPage('home')">
                        <div class="bg-blue-600 p-2 rounded-lg h-10 w-10 flex items-center justify-center" id="nav-logo-container">
                            <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="font-bold text-xl tracking-tight hidden sm:block uppercase ml-2" id="nav-title-display">PAUD & DIKMAS</span>
                    </div>
                    <button id="btn-edit-nav" class="admin-only btn-edit-floating hidden" onclick="window.openEdit('nav_settings')">
                        <i data-lucide="edit-3" class="w-3 h-3"></i>
                    </button>
                </div>
                
                <div class="hidden lg:flex space-x-6 font-medium" id="nav-container"></div>

                <div class="flex items-center gap-4">
                    <button id="btn-user-mgmt" onclick="window.openEdit('user_mgmt')" class="admin-only hidden items-center gap-1 bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-[10px] font-bold border border-amber-200 hover:bg-amber-100 transition-all uppercase tracking-wider">
                        <i data-lucide="users" class="w-3 h-3"></i> Manajemen User
                    </button>

                    <div id="admin-indicator" class="hidden items-center gap-2 bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-200">
                        <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span>
                        <span id="role-display" class="uppercase">ADMIN</span>
                        <button onclick="window.logoutAdmin()" class="ml-2 hover:text-red-600" title="Keluar"><i data-lucide="log-out" class="w-3 h-3"></i></button>
                    </div>
                    
                    <div class="lg:hidden">
                        <button id="mobile-menu-btn" class="p-2 text-slate-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                            <i data-lucide="menu"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden lg:hidden bg-white border-t px-4 py-4 space-y-4 shadow-lg"></div>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[70vh]" id="app-content"></main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 mt-16" id="app-footer"></footer>

    <!-- Modal: Login -->
    <div id="login-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-2"><i data-lucide="lock" class="text-blue-600"></i> Akses Pengelola</h3>
            <div class="space-y-4">
                <input type="text" id="login-user" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Username">
                <input type="password" id="login-pass" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Password">
                <button onclick="window.attemptLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg">Masuk</button>
                <button onclick="window.closeModal('login-modal')" class="w-full text-slate-500 text-sm py-2">Batal</button>
            </div>
        </div>
    </div>

    <!-- Modal: Editor -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold" id="edit-title">Edit Konten</h3>
                <button onclick="window.closeModal('edit-modal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <div id="edit-fields" class="space-y-6"></div>
            <div class="flex gap-4 mt-8 sticky bottom-0 bg-white pt-4 border-t">
                <button onclick="window.saveChanges()" id="btn-save" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-xl disabled:opacity-50">Simpan Perubahan</button>
                <button onclick="window.closeModal('edit-modal')" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-lg font-bold hover:bg-slate-200">Batal</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ==========================================
        // --- 1. CONFIGURATION ---
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBg1gWCIVxOE4JWr4tEJxs-GH9ff4jx5oE",
  authDomain: "pauddikmas-a8c3b.firebaseapp.com",
  projectId: "pauddikmas-a8c3b",
  storageBucket: "pauddikmas-a8c3b.firebasestorage.app",
  messagingSenderId: "940015031908",
  appId: "1:940015031908:web:6cac7280253fe58341f171",
  measurementId: "G-XGH7YLVVQM"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'paud-dikmas-profile-01'; 
        const apiKeyGemini = ""; 

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Path Konfigurasi (Sesuai Aturan Sistem)
        const pathSettings = `artifacts/${appId}/public/data/settings/main`;
        const pathNews = `artifacts/${appId}/public/data/news`;
        const pathUsers = `artifacts/${appId}/public/data/users`;

        // ==========================================
        // --- 2. GLOBAL STATE ---
        // ==========================================
        let isAdmin = false;
        let userRole = ''; 
        let userPermissions = []; 
        let currentPage = 'home';
        let editingContext = null;
        let currentSlide = 0;

        let siteData = {
            home: { 
                navTitle: "PAUD & DIKMAS", navLogo: "", 
                heroSlides: [{ title: "Membangun Generasi Emas", subtitle: "Layanan pendidikan non-formal yang berkualitas.", image: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80" }], 
                profileTitle: "Profil Bidang", profileText: "Bidang Pembinaan PAUD dan Pendidikan Masyarakat mengoordinasikan penyelenggaraan pendidikan non-formal yang berkualitas.", 
                visiMisiTitle: "Visi & Misi", visiMisi: ["Meningkatkan akses layanan.", "Optimalisasi tata kelola."], 
                strukturTitle: "Struktur Organisasi", kabidName: "Nama Kepala Bidang", kabidPhoto: "https://api.dicebear.com/7.x/avataaars/svg?seed=kabid", 
                sections: [
                    { id: 'paud', name: 'Seksi PAUD', kasiName: 'Kasi PAUD', kasiNip: '-', kasiPhoto: '', staff: [], desc: 'Pembinaan PAUD.', ctaTitle: '', ctaLink: '#' },
                    { id: 'sarpras', name: 'Seksi Sarpras', kasiName: 'Kasi Sarpras', kasiNip: '-', kasiPhoto: '', staff: [], desc: 'Manajemen sarana.', ctaTitle: '', ctaLink: '#' },
                    { id: 'dikmas', name: 'Seksi Dikmas', kasiName: 'Kasi Dikmas', kasiNip: '-', kasiPhoto: '', staff: [], desc: 'Pendidikan kesetaraan.', ctaTitle: '', ctaLink: '#' }
                ],
                kabidBanner: "https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80",
                kabidMotto: "Berakhlak, Profesional, dan Inovatif.",
                kabidSambutan: "Selamat datang di portal informasi resmi Bidang Pembinaan PAUD dan Dikmas.",
                kabidBiodata: { nama: "Nama Lengkap", nip: "-", jabatan: "Kepala Bidang", pendidikan: "-", bio: "-" },
                kabidPrograms: [{ title: "Digitalisasi PAUD", desc: "Meningkatkan kualitas data." }],
                footerContact: "Dinas Pendidikan\nKota Anda, Indonesia", 
                footerLinks: [{ label: "Kemdikbud", url: "https://kemdikbud.go.id" }]
            },
            news: [],
            users: []
        };

        // ==========================================
        // --- 3. CORE LOGIC (REGISTER TO WINDOW) ---
        // ==========================================

        window.canEdit = (perm) => {
            if (!isAdmin) return false;
            if (userRole === 'super_admin') return true;
            return (userPermissions || []).includes(perm);
        };

        window.showPage = (id) => { 
            currentPage = id; 
            window.renderPage(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        };

        window.openModal = (id) => { 
            const el = document.getElementById(id); 
            if (el) { el.classList.remove('hidden'); el.classList.add('flex'); } 
        };

        window.closeModal = (id) => { 
            const el = document.getElementById(id); 
            if (el) { el.classList.add('hidden'); el.classList.remove('flex'); } 
        };

        window.attemptLogin = () => {
            const u = document.getElementById('login-user').value; 
            const p = document.getElementById('login-pass').value;
            const found = siteData.users.find(x => x.username === u && x.password === p);
            if (found) { 
                isAdmin = true; 
                userRole = found.role; 
                userPermissions = found.permissions || []; 
                document.getElementById('main-body').classList.add('is-admin'); 
                window.closeModal('login-modal'); 
                window.renderPage(); 
            } else {
                alert('Login Gagal! Akun tidak ditemukan.');
            }
        };

        window.logoutAdmin = () => { 
            isAdmin = false; 
            userRole = ''; 
            userPermissions = []; 
            document.getElementById('main-body').classList.remove('is-admin'); 
            window.renderPage(); 
        };

        // ==========================================
        // --- 4. VIEWS ---
        // ==========================================

        const renderHeroSlide = (index) => {
            const slides = siteData.home.heroSlides || [];
            const slide = slides[index] || slides[0];
            return `<div class="absolute inset-0 slide-enter"><div class="absolute inset-0 bg-cover bg-center" style="background-image: url('${slide.image}');"></div><div class="absolute inset-0 bg-blue-900/60 backdrop-blur-[1px]"></div><div class="relative h-full flex items-center p-8 md:p-16 max-w-4xl text-white"><div><h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight">${slide.title}</h1><p class="text-lg opacity-90">${slide.subtitle}</p></div></div></div>`;
        };

        const renderHomeView = () => {
            const { home } = siteData;
            const hasPerm = window.canEdit('home');
            const editBtn = (ctx) => hasPerm ? `<button class="btn-edit-floating" onclick="window.openEdit('${ctx}')"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : '';
            return `<section class="page-content animate-fade-in">
                <div class="relative rounded-3xl overflow-hidden bg-blue-900 mb-12 min-h-[400px] shadow-xl group" id="hero-slider-container">
                    ${renderHeroSlide(currentSlide)}
                    ${hasPerm ? `<button class="admin-only absolute top-4 right-4 z-20 bg-white/20 p-2 rounded-lg text-white" onclick="window.openEdit('home_hero')"><i data-lucide="layers" class="w-4 h-4"></i></button>` : ''}
                </div>
                <div class="grid md:grid-cols-2 gap-8 mb-16">
                    <div class="bg-white p-8 rounded-2xl shadow-sm border"><h2 class="text-2xl font-bold mb-4 flex items-center text-blue-900"><i data-lucide="info" class="text-blue-600 mr-2"></i> ${home.profileTitle} ${editBtn('home_profile')}</h2><p class="text-slate-600 leading-relaxed">${home.profileText}</p></div>
                    <div class="bg-white p-8 rounded-2xl shadow-sm border"><h2 class="text-2xl font-bold mb-4 flex items-center text-blue-900"><i data-lucide="target" class="text-blue-600 mr-2"></i> ${home.visiMisiTitle} ${editBtn('home_visimisi')}</h2><ul class="space-y-3 text-slate-600">${(home.visiMisi || []).map((v, i) => `<li><b>${i+1}.</b> ${v}</li>`).join('')}</ul></div>
                </div>
                <div class="bg-white p-8 md:p-12 rounded-3xl shadow-sm border text-center mb-16 relative overflow-hidden">
                    <h2 class="text-3xl font-bold mb-16 text-blue-900">${home.strukturTitle} ${editBtn('home_struktur')}</h2>
                    <div class="flex flex-col items-center">
                        <div class="mb-12">
                            <div class="avatar-frame ring-4 ring-blue-100 mb-3 mx-auto shadow-lg"><img src="${home.kabidPhoto || 'https://api.dicebear.com/7.x/avataaars/svg?seed=kabid'}"></div>
                            <div class="bg-blue-700 text-white px-8 py-4 rounded-2xl shadow-lg min-w-[240px] font-bold text-lg cursor-pointer hover:bg-blue-800" onclick="window.showPage('kabid')">${home.kabidName}</div>
                            <div class="h-12 w-px bg-slate-200 mx-auto"></div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 w-full relative">
                            <div class="hidden lg:block absolute top-0 left-1/2 -translate-x-1/2 w-2/3 h-px bg-slate-200"></div>
                            ${(home.sections || []).map(sec => `
                                <div class="flex flex-col items-center">
                                    <div class="avatar-frame ring-4 ring-slate-50 mb-3"><img src="${sec.kasiPhoto || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + sec.id}"></div>
                                    <div class="bg-slate-800 text-white p-4 rounded-xl shadow-md w-full cursor-pointer hover:bg-slate-700 transition-all" onclick="window.showPage('${sec.id}')">
                                        <p class="text-[10px] uppercase opacity-60 font-bold mb-1">${sec.name}</p>
                                        <p class="font-bold text-sm">${sec.kasiName}</p>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
            </section>`;
        };

        const renderKabidView = () => {
            const { home } = siteData;
            const isSuper = window.canEdit('kabid');
            return `<section class="page-content animate-fade-in">
                <div class="relative rounded-3xl overflow-hidden mb-8 shadow-xl min-h-[350px] flex items-center">
                    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('${home.kabidBanner}');"></div>
                    <div class="absolute inset-0 bg-gradient-to-r from-blue-900 via-blue-900/80 to-transparent"></div>
                    <div class="relative z-10 w-full px-8 md:px-12 flex flex-col md:flex-row gap-8 items-center text-center md:text-left">
                        <div class="avatar-frame !w-44 !h-44 ring-8 ring-white/10 shadow-2xl shrink-0"><img src="${home.kabidPhoto}" class="w-full h-full object-cover"></div>
                        <div class="flex-grow">
                            <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                                <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Kepala Bidang</span>
                                ${isSuper ? `<button class="p-2 bg-white/20 hover:bg-white/40 rounded-lg text-white transition-all" onclick="window.openEdit('kabid_sampul')"><i data-lucide="camera" class="w-4 h-4"></i></button>` : ''}
                            </div>
                            <h2 class="text-3xl md:text-5xl font-bold text-white mb-2">${home.kabidName}</h2>
                            <p class="text-blue-100 text-lg font-medium opacity-90 max-w-2xl italic">"${home.kabidMotto}"</p>
                        </div>
                    </div>
                </div>
                <div class="grid lg:grid-cols-3 gap-8 mb-12">
                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white p-8 rounded-3xl border shadow-sm">
                            <h3 class="text-2xl font-bold text-blue-900 mb-6 flex items-center gap-2"><i data-lucide="message-square" class="text-blue-600"></i> Sambutan Resmi ${isSuper ? `<button class="btn-edit-floating" onclick="window.openEdit('kabid_sambutan')"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : ''}</h3>
                            <div class="text-slate-600 leading-relaxed italic whitespace-pre-line text-lg">${home.kabidSambutan}</div>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border shadow-sm">
                            <h3 class="text-2xl font-bold text-blue-900 mb-8 flex items-center justify-between"><span class="flex items-center gap-2"><i data-lucide="rocket" class="text-blue-600"></i> Program Prioritas</span>${isSuper ? `<button class="text-xs bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-sm" onclick="window.openEdit('kabid_programs')">Kelola Program</button>` : ''}</h3>
                            <div class="grid md:grid-cols-2 gap-6">${(home.kabidPrograms || []).map(p => `<div class="p-6 bg-slate-50 rounded-2xl border-l-4 border-blue-600 shadow-sm"><h4 class="font-bold text-slate-800 mb-1 uppercase text-sm">${p.title}</h4><p class="text-xs text-slate-500">${p.desc}</p></div>`).join('')}</div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm h-fit sticky top-24">
                        <h3 class="text-2xl font-bold text-blue-900 mb-6 flex items-center gap-2"><i data-lucide="user" class="text-blue-600"></i> Biodata Lengkap ${isSuper ? `<button class="btn-edit-floating" onclick="window.openEdit('kabid_biodata')"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : ''}</h3>
                        <div class="space-y-4">
                            <div class="border-b pb-2"><p class="text-[10px] uppercase text-slate-400 font-bold">Nama Lengkap</p><p class="font-bold text-slate-800">${home.kabidBiodata.nama}</p></div>
                            <div class="border-b pb-2"><p class="text-[10px] uppercase text-slate-400 font-bold">NIP</p><p class="text-slate-700 font-medium">${home.kabidBiodata.nip}</p></div>
                            <div class="border-b pb-2"><p class="text-[10px] uppercase text-slate-400 font-bold">Jabatan</p><p class="text-slate-700">${home.kabidBiodata.jabatan}</p></div>
                            <div class="border-b pb-2"><p class="text-[10px] uppercase text-slate-400 font-bold">Pendidikan</p><p class="text-slate-700">${home.kabidBiodata.pendidikan}</p></div>
                            <div class="pt-2"><p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Motto Hidup</p><p class="text-sm text-slate-600 italic">${home.kabidBiodata.bio}</p></div>
                        </div>
                    </div>
                </div>
            </section>`;
        };

        const renderSectionView = (type) => {
            const section = siteData.home.sections.find(s => s.id === type);
            if (!section) return `<div class="p-12 text-center">Data tidak ditemukan.</div>`;
            const hasPerm = window.canEdit(type);
            const isSuper = window.canEdit(type); // Biasakan super admin untuk struktur seksi
            return `<section class="page-content animate-fade-in">
                <div class="bg-blue-900 text-white rounded-3xl p-8 md:p-12 mb-8 shadow-lg min-h-[300px] flex items-center relative overflow-hidden">
                    <div class="relative z-10 w-full">
                        <h2 class="text-3xl md:text-4xl font-bold uppercase mb-4">${section.name} ${hasPerm ? `<button class="btn-edit-floating text-white/50" onclick="window.openEdit('section_desc', '${type}')"><i data-lucide="edit-3" class="w-5 h-5"></i></button>` : ''}</h2>
                        <p class="text-blue-100 max-w-3xl text-lg mb-8">${section.desc || ''}</p>
                        ${section.ctaLink && section.ctaLink !== '#' ? `<a href="${section.ctaLink}" target="_blank" class="bg-white text-blue-900 px-8 py-3 rounded-2xl font-bold inline-flex items-center gap-2 hover:bg-blue-50 shadow-xl transition-all">${section.ctaTitle || 'Lihat Selengkapnya'} <i data-lucide="external-link" class="w-4 h-4"></i></a>` : ''}
                    </div>
                </div>
                <div class="mb-12">

                }
                else if (ctx.type === 'add_news' || ctx.type === 'edit_news') {
                    const newsData = { title: document.getElementById('i-news-title').value, date: document.getElementById('i-news-date').value, content: document.getElementById('i-news-content').value, images: document.getElementById('i-news-images').value.split(',').map(s => s.trim()).filter(s => s !== ''), timestamp: Date.now() };
                    if (ctx.type === 'add_news') await addDoc(collection(db, pathNews), newsData);
                    else await setDoc(doc(db, pathNews, ctx.id), newsData, { merge: true });
                    window.closeModal('edit-modal'); window.renderPage(); return;
                }
                await setDoc(doc(db, pathSettings), up); window.closeModal('edit-modal'); window.renderPage();
            } catch (e) { alert("Simpan Gagal!"); } finally { btn.disabled = false; btn.innerText = "Simpan Perubahan"; }
        };

        // --- HELPER METHODS ---
        window.addVMField = () => { document.getElementById('vm-list-edit').insertAdjacentHTML('beforeend', `<div class="flex gap-2"><input class="vm-item-input w-full p-2 border rounded text-sm"><button onclick="this.parentElement.remove()" class="text-red-500 font-bold px-2">X</button></div>`); };
        window.addProgramField = () => { document.getElementById('program-list-edit').insertAdjacentHTML('beforeend', `<div class="p-4 bg-slate-50 border rounded-xl relative program-item-edit"><input class="prog-title w-full p-2 border rounded font-bold mb-2 text-sm" placeholder="Program Baru"><textarea class="prog-desc w-full p-2 border rounded text-xs" placeholder="Deskripsi"></textarea><button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">X</button></div>`); };
        window.addStaffField = () => { document.getElementById('staff-list-edit').insertAdjacentHTML('beforeend', `<div class="p-3 border rounded-lg bg-white relative staff-item-edit"><div class="grid grid-cols-2 gap-2 mb-2"><input class="st-name p-2 border rounded text-xs" placeholder="Nama"><input class="st-nip p-2 border rounded text-xs" placeholder="NIP"></div><input class="st-role p-2 border rounded text-xs w-full mt-1" placeholder="Jabatan"><input class="st-photo p-2 border rounded text-xs w-full mt-1" placeholder="URL Foto"></div>`); };
        window.addFooterLinkField = () => { document.getElementById('footer-links-edit-container').insertAdjacentHTML('beforeend', `<div class="flex gap-2 footer-link-item mb-2 p-2 bg-slate-50 rounded-lg"><input class="f-link-label p-2 border rounded text-xs flex-1" placeholder="Label"><input class="f-link-url p-2 border rounded text-xs flex-1" placeholder="URL"></div>`); };
        window.addSlide = () => { siteData.home.heroSlides.push({title:'Slide Baru', subtitle:'', image:''}); window.openEdit('home_hero'); };
        window.removeSlide = (i) => { siteData.home.heroSlides.splice(i,1); window.openEdit('home_hero'); };
        window.deleteNews = async (id) => { if (confirm('Hapus Berita?')) await deleteDoc(doc(db, pathNews, id)); };
        window.deleteUser = async (id) => { if (confirm('Hapus User?')) await deleteDoc(doc(db, pathUsers, id)); window.openEdit('user_mgmt'); };
        window.addUser = async () => { const u = document.getElementById('new-u').value; const p = document.getElementById('new-p').value; const ps = Array.from(document.querySelectorAll('.new-perm:checked')).map(cb => cb.value); if (u && p) await addDoc(collection(db, pathUsers), { username: u, password: p, role: 'editor', permissions: ps }); window.openEdit('user_mgmt'); };
        window.aiRefineText = async (id) => { const el = document.getElementById(id); if (el && el.value.length > 5) { const r = await callGemini(`Perhalus teks formal dinas: ${el.value}`, "Penulis Konten"); if (r) el.value = r.trim().replace(/^"(.*)"$/, '$1'); } };

        // --- SISTEM BOOT & LISTENERS ---
        async function setupListeners(user) {
            if (!user) return;
            onSnapshot(doc(db, pathSettings), (snap) => { 
                if (snap.exists()) { siteData.home = snap.data(); window.renderPage(); } 
                else setDoc(doc(db, pathSettings), siteData.home); 
                document.getElementById('loading-screen').classList.add('hidden'); 
            }, (err) => { console.error(err); document.getElementById('loading-screen').classList.add('hidden'); });
            
            onSnapshot(collection(db, pathNews), (snap) => { siteData.news = snap.docs.map(d => ({ id: d.id, ...d.data() })); window.renderPage(); });
            
            onSnapshot(collection(db, pathUsers), (snap) => { 
                siteData.users = snap.docs.map(d => ({ id: d.id, ...d.data() })); 
                if (siteData.users.length === 0) addDoc(collection(db, pathUsers), { username: 'admin', password: '123', role: 'super_admin', permissions: ['home', 'kabid', 'paud', 'sarpras', 'dikmas', 'informasi'] }); 
            });
        }
        
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Auth error:", e); }
        }

        onAuthStateChanged(auth, (user) => { if (user) setupListeners(user); });
        initAuth();
    </script>
</body>
</html>
